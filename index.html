      --green-soft: #37422E;
      --regular-soft: #3A4235;
      --danger: #E8A091;
      --danger-soft: #46302B;
      --shadow: 0 2px 14px rgba(0, 0, 0, .35);
      --sheet-shadow: 0 -8px 40px rgba(0, 0, 0, .55);
    }
  }

  :root[data-theme="light"] {
    --bg: #F8FAF2;
    --card: #FFFFFF;
    --ink: #3A4636;
    --ink-soft: #78866F;
    --line: #E6ECDA;
    --accent: #A9CD8E;
    --on-accent: #2E4321;
    --accent-ink: #5A7A42;
    --accent-soft: #EDF4E1;
    --salvia: #DCEBC6;
    --salvia-ink: #47632F;
    --crema: #F7E7B0;
    --crema-ink: #77621F;
    --coral: #F2AF9F;
    --on-coral: #5C3026;
    --green: #5A7A42;
    --green-soft: #EDF4E1;
    --regular-soft: #EFF0E8;
    --danger: #BF6A55;
    --danger-soft: #F9E6DF;
    --shadow: 0 2px 14px rgba(120, 150, 100, .12);
    --sheet-shadow: 0 -8px 40px rgba(60, 80, 45, .20);
  }

  :root[data-theme="dark"] {
    --bg: #232921;
    --card: #2E362B;
    --ink: #EAF0E3;
    --ink-soft: #A8B49C;
    --line: #40493A;
    --accent: #A9CD8E;
    --on-accent: #24301B;
    --accent-ink: #C6DDB1;
    --accent-soft: #3A4630;
    --salvia: #4E5C41;
    --salvia-ink: #DDEBCB;
    --crema: #4C4426;
    --crema-ink: #EFDFA3;
    --coral: #E8A091;
    --on-coral: #33201B;
    --green: #B4D19C;
    --green-soft: #37422E;
    --regular-soft: #3A4235;
    --danger: #E8A091;
    --danger-soft: #46302B;
    --shadow: 0 2px 14px rgba(0, 0, 0, .35);
    --sheet-shadow: 0 -8px 40px rgba(0, 0, 0, .55);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Nunito', ui-rounded, -apple-system, "Segoe UI", system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
  }

  .display {
    font-family: 'Nunito', ui-rounded, "SF Pro Rounded", -apple-system, "Segoe UI", system-ui, sans-serif;
    font-weight: 800;
    letter-spacing: -0.01em;
  }

  button {
    font: inherit;
    color: inherit;
    border: none;
    background: none;
    cursor: pointer;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  button:focus-visible, input:focus-visible, textarea:focus-visible {
    outline: 3px solid var(--accent);
    outline-offset: 2px;
    border-radius: 8px;
  }

  /* ── Cabecera ─────────────────────────────── */

  header.top {
    padding: calc(26px + env(safe-area-inset-top)) 20px 0;
    max-width: 560px;
    margin: 0 auto;
  }

  h1 {
    margin: 0;
    font-size: 1.7rem;
    text-wrap: balance;
  }

  .subtitulo {
    margin: 2px 0 0;
    color: var(--ink-soft);
    font-size: .95rem;
  }

  nav.tabs {
    display: flex;
    gap: 8px;
    margin: 18px 0 4px;
  }

  .tab {
    flex: 1;
    padding: 10px 14px;
    border-radius: 999px;
    background: var(--card);
    color: var(--ink-soft);
    font-weight: 700;
    font-size: .95rem;
    box-shadow: var(--shadow);
    transition: background .2s, color .2s;
  }

  .tab[aria-selected="true"] {
    background: var(--accent);
    color: var(--on-accent);
  }

  /* ── Contenido ────────────────────────────── */

  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 14px 16px calc(110px + env(safe-area-inset-bottom));
  }

  .vacio {
    text-align: center;
    padding: 56px 24px;
    color: var(--ink-soft);
  }

  .vacio .icono { font-size: 3.4rem; display: block; margin-bottom: 12px; }

  /* Tarjeta de entrada del diario */
  .dia {
    background: var(--card);
    border-radius: 22px;
    box-shadow: var(--shadow);
    padding: 18px 18px 16px;
    margin-bottom: 16px;
  }

  .dia-cabecera {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }

  .fecha {
    font-size: 1.05rem;
    color: var(--accent-ink);
  }

  .fecha .hoy-etiqueta {
    font-size: .75rem;
    background: var(--accent-soft);
    color: var(--accent-ink);
    border-radius: 999px;
    padding: 2px 10px;
    margin-left: 6px;
    vertical-align: 2px;
  }

  .acciones { display: flex; gap: 4px; flex-shrink: 0; }

  .accion-btn {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    display: grid;
    place-items: center;
    color: var(--ink-soft);
    font-size: 1rem;
  }

  .accion-btn:active { background: var(--line); }

  .accion-btn.confirmar {
    background: var(--danger-soft);
    color: var(--danger);
    width: auto;
    padding: 0 12px;
    font-weight: 700;
    font-size: .85rem;
  }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--salvia);
    color: var(--salvia-ink);
    font-weight: 700;
    font-size: .95rem;
    border-radius: 999px;
    padding: 6px 14px 6px 10px;
  }

  .chip.nuevo::after {
    content: "¡nuevo!";
    font-size: .7rem;
    background: var(--crema);
    color: var(--crema-ink);
    border-radius: 999px;
    padding: 1px 8px;
    font-weight: 800;
  }

  .reaccion {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    border-radius: 14px;
    padding: 7px 14px;
    font-weight: 700;
    font-size: .9rem;
  }

  .reaccion.encanto { background: var(--crema); color: var(--crema-ink); }
  .reaccion.bien    { background: var(--green-soft);  color: var(--green); }
  .reaccion.regular { background: var(--regular-soft); color: var(--ink-soft); }
  .reaccion.mal     { background: var(--danger-soft); color: var(--danger); }

  .nota {
    margin: 12px 2px 0;
    color: var(--ink);
    font-size: .97rem;
    white-space: pre-wrap;
    overflow-wrap: break-word;
  }

  .fotos {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 14px;
  }

  .fotos img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 14px;
    display: block;
    cursor: pointer;
    max-width: 100%;
  }

  .fotos img:only-child { grid-column: 1 / -1; aspect-ratio: 4 / 3; }

  /* ── Pestaña Alimentos ────────────────────── */

  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }

  .stat {
    flex: 1;
    background: var(--card);
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 16px;
    text-align: center;
  }

  .stat .num {
    font-size: 2rem;
    line-height: 1.1;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }

  .stat .desc { font-size: .82rem; color: var(--ink-soft); font-weight: 600; }

  .lista-alimentos {
    background: var(--card);
    border-radius: 22px;
    box-shadow: var(--shadow);
    padding: 8px 18px;
    margin-bottom: 16px;
  }

  .alimento-fila {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }

  .alimento-fila:last-child { border-bottom: none; }

  .alimento-num {
    font-size: .8rem;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
    min-width: 1.8em;
    text-align: right;
    font-weight: 700;
  }

  .alimento-emoji { font-size: 1.5rem; }

  .alimento-nombre { font-weight: 700; flex: 1; }

  .alimento-meta {
    font-size: .8rem;
    color: var(--ink-soft);
    text-align: right;
    line-height: 1.3;
  }

  /* Copia de seguridad */
  .backup {
    background: var(--card);
    border-radius: 22px;
    box-shadow: var(--shadow);
    padding: 18px;
  }

  .backup h2 { margin: 0 0 6px; font-size: 1.05rem; }

  .backup p { margin: 0 0 14px; font-size: .88rem; color: var(--ink-soft); }

  .backup-botones { display: flex; gap: 10px; }

  .backup + .backup { margin-top: 16px; }

  .backup p.estado-sync { margin: 12px 0 0; font-size: .85rem; min-height: 1.2em; }

  .backup input[type="password"] { margin-bottom: 10px; }

  .btn-conectar { width: 100%; display: block; }

  .btn-magico { width: 100%; display: block; margin-top: 10px; }

  .ayuda-token { margin: 0 0 14px; font-size: .88rem; color: var(--ink-soft); }
  .ayuda-token summary { cursor: pointer; font-weight: 700; color: var(--accent-ink); }
  .ayuda-token ol { margin: 10px 0 0; padding-left: 20px; display: flex; flex-direction: column; gap: 6px; }
  .ayuda-token code { background: var(--regular-soft); border-radius: 6px; padding: 1px 6px; }

  .btn-secundario {
    flex: 1;
    padding: 12px;
    border-radius: 14px;
    background: var(--accent-soft);
    color: var(--accent-ink);
    font-weight: 700;
    font-size: .92rem;
    text-align: center;
  }

  /* ── Botón flotante ───────────────────────── */

  .fab {
    position: fixed;
    right: 20px;
    bottom: calc(24px + env(safe-area-inset-bottom));
    width: 64px;
    height: 64px;
    border-radius: 999px;
    background: var(--coral);
    color: var(--on-coral);
    font-size: 2rem;
    line-height: 1;
    box-shadow: 0 6px 20px rgba(210, 140, 120, .38);
    display: grid;
    place-items: center;
    z-index: 30;
    transition: transform .15s;
  }

  .fab:active { transform: scale(.92); }

  /* ── Hoja del formulario ──────────────────── */

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(40, 22, 30, .45);
    z-index: 40;
    display: none;
  }

  .overlay.abierta { display: block; }

  .hoja {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    max-height: 92dvh;
    overflow-y: auto;
    background: var(--bg);
    border-radius: 26px 26px 0 0;
    box-shadow: var(--sheet-shadow);
    z-index: 50;
    padding: 10px 20px calc(24px + env(safe-area-inset-bottom));
    display: none;
  }

  .hoja.abierta { display: block; animation: subir .28s ease-out; }

  @keyframes subir {
    from { transform: translateY(40%); opacity: .4; }
    to   { transform: translateY(0);   opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    .hoja.abierta { animation: none; }
    .fab, .tab { transition: none; }
  }

  .asa {
    width: 44px;
    height: 5px;
    border-radius: 999px;
    background: var(--line);
    margin: 4px auto 14px;
  }

  .hoja h2 { margin: 0 0 16px; font-size: 1.25rem; }

  .campo { margin-bottom: 18px; }

  .campo > label, .campo > .etiqueta {
    display: block;
    font-size: .78rem;
    font-weight: 800;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }

  input[type="date"], input[type="text"], input[type="password"], textarea {
    width: 100%;
    padding: 13px 14px;
    border-radius: 14px;
    border: 1.5px solid var(--line);
    background: var(--card);
    color: var(--ink);
    font: inherit;
  }

  textarea { resize: vertical; min-height: 74px; }

  .fila-anadir { display: flex; gap: 8px; }

  .fila-anadir input { flex: 1; min-width: 0; }

  .btn-anadir {
    padding: 0 18px;
    border-radius: 14px;
    background: var(--green-soft);
    color: var(--green);
    font-weight: 800;
    flex-shrink: 0;
  }

  .chips-form { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

  .chip-form {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green-soft);
    color: var(--green);
    font-weight: 700;
    border-radius: 999px;
    padding: 7px 8px 7px 12px;
  }

  .chip-form button {
    width: 24px;
    height: 24px;
    border-radius: 999px;
    background: rgba(0,0,0,.08);
    font-size: .8rem;
    display: grid;
    place-items: center;
    color: inherit;
  }

  .reacciones { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

  .reaccion-opcion {
    padding: 10px 4px;
    border-radius: 14px;
    background: var(--card);
    border: 2px solid var(--line);
    text-align: center;
    font-size: .72rem;
    font-weight: 700;
    color: var(--ink-soft);
    line-height: 1.3;
  }

  .reaccion-opcion .cara { font-size: 1.5rem; display: block; }

  .reaccion-opcion.elegida {
    border-color: var(--accent);
    background: var(--accent-soft);
    color: var(--accent-ink);
  }

  .btn-fotos {
    width: 100%;
    padding: 13px;
    border-radius: 14px;
    border: 2px dashed var(--line);
    color: var(--ink-soft);
    font-weight: 700;
    text-align: center;
    background: var(--card);
  }

  .miniaturas {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 10px;
  }

  .miniatura { position: relative; }

  .miniatura img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 12px;
    display: block;
  }

  .miniatura button {
    position: absolute;
    top: -6px;
    right: -6px;
    width: 26px;
    height: 26px;
    border-radius: 999px;
    background: var(--danger);
    color: white;
    font-size: .8rem;
    display: grid;
    place-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
  }

  .btn-guardar {
    width: 100%;
    padding: 16px;
    border-radius: 18px;
    background: var(--accent);
    color: var(--on-accent);
    font-weight: 800;
    font-size: 1.05rem;
    margin-top: 6px;
  }

  .btn-guardar:disabled { opacity: .5; }

  /* ── Visor de fotos ───────────────────────── */

  .visor {
    position: fixed;
    inset: 0;
    background: rgba(15, 8, 12, .92);
    z-index: 60;
    display: none;
    place-items: center;
    padding: 16px;
  }

  .visor.abierto { display: grid; }

  .visor img {
    max-width: 100%;
    max-height: 88dvh;
    border-radius: 16px;
  }

  .visor .cerrar {
    position: absolute;
    top: calc(14px + env(safe-area-inset-top));
    right: 16px;
    width: 44px;
    height: 44px;
    border-radius: 999px;
    background: rgba(255,255,255,.15);
    color: white;
    font-size: 1.2rem;
  }

  /* ── Aviso (toast) ────────────────────────── */

  .toast {
    position: fixed;
    left: 50%;
    bottom: calc(104px + env(safe-area-inset-bottom));
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: 999px;
    font-weight: 700;
    font-size: .9rem;
    z-index: 70;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
    max-width: 90vw;
    text-align: center;
  }

  .toast.visible { opacity: 1; }
</style>

</head>
<body>
<header class="top">
  <h1 class="display">Primeros alimentos de Júlia 👶🏻</h1>
  <p class="subtitulo">Su diario de descubrimientos, bocado a bocado</p>
  <nav class="tabs" role="tablist">
    <button class="tab display" id="tab-diario" role="tab" aria-selected="true">📖 Diario</button>
    <button class="tab display" id="tab-alimentos" role="tab" aria-selected="false">🥕 Alimentos</button>
  </nav>
</header>

<main>
  <section id="vista-diario"></section>
  <section id="vista-alimentos" hidden></section>
</main>

<button class="fab" id="btn-nueva" aria-label="Apuntar una comida">＋</button>

<div class="overlay" id="overlay"></div>

<div class="hoja" id="hoja" role="dialog" aria-label="Apuntar una comida">
  <div class="asa"></div>
  <h2 class="display" id="hoja-titulo">Apuntar una comida</h2>

  <div class="campo">
    <label for="campo-fecha">Fecha</label>
    <input type="date" id="campo-fecha">
  </div>

  <div class="campo">
    <label for="campo-alimento">Alimentos</label>
    <div class="fila-anadir">
      <input type="text" id="campo-alimento" placeholder="Escribe uno, ej. plátano" autocomplete="off" enterkeyhint="done">
      <button class="btn-anadir" id="btn-anadir-alimento">Añadir</button>
    </div>
    <div class="chips-form" id="chips-form"></div>
  </div>

  <div class="campo">
    <span class="etiqueta">¿Qué tal le fue?</span>
    <div class="reacciones" id="reacciones"></div>
  </div>

  <div class="campo">
    <label for="campo-nota">Nota</label>
    <textarea id="campo-nota" placeholder="Ej. Le encantó, ¡se lo comió todo con las manos!"></textarea>
  </div>

  <div class="campo">
    <span class="etiqueta">Fotos</span>
    <button class="btn-fotos" id="btn-fotos">📷 Añadir fotos del momento</button>
    <input type="file" id="input-fotos" accept="image/*" multiple hidden>
    <div class="miniaturas" id="miniaturas"></div>
  </div>

  <button class="btn-guardar display" id="btn-guardar">Guardar en el diario 🥣</button>
</div>

<div class="visor" id="visor">
  <button class="cerrar" aria-label="Cerrar">✕</button>
  <img id="visor-img" alt="Foto del diario">
</div>

<div class="toast" id="toast" role="status"></div>

<script>
(function () {
  'use strict';

  /* ── Emojis automáticos ─────────────────── */
  var EMOJIS = {
    platano: '🍌', banana: '🍌', agua: '💧', calabacin: '🥒', pepino: '🥒',
    zanahoria: '🥕', manzana: '🍎', pera: '🍐', patata: '🥔', papa: '🥔',
    boniato: '🍠', batata: '🍠', aguacate: '🥑', palta: '🥑', tomate: '🍅',
    brocoli: '🥦', coliflor: '🥦', judia: '🫛', guisante: '🫛', calabaza: '🎃',
    maiz: '🌽', arroz: '🍚', pasta: '🍝', macarron: '🍝', fideo: '🍜',
    pan: '🍞', avena: '🥣', cereal: '🥣', quinoa: '🥣', lenteja: '🫘',
    garbanzo: '🫘', alubia: '🫘', pollo: '🍗', pavo: '🍗', ternera: '🥩',
    cerdo: '🥩', cordero: '🥩', pescado: '🐟', merluza: '🐟', salmon: '🐟',
    lenguado: '🐟', huevo: '🥚', yogur: '🥛', leche: '🥛', queso: '🧀',
    fresa: '🍓', naranja: '🍊', mandarina: '🍊', melocoton: '🍑',
    albaricoque: '🍑', nectarina: '🍑', ciruela: '🍑', uva: '🍇',
    sandia: '🍉', melon: '🍈', kiwi: '🥝', mango: '🥭', cereza: '🍒',
    arandano: '🫐', frambuesa: '🍓', mora: '🫐', limon: '🍋', oliva: '🫒',
    aceituna: '🫒', aceite: '🫒', espinaca: '🥬', acelga: '🥬', lechuga: '🥬',
    col: '🥬', seta: '🍄', champinon: '🍄', cebolla: '🧅', ajo: '🧄',
    pimiento: '🫑', berenjena: '🍆', remolacha: '🍠', esparrago: '🥬',
    galleta: '🍪', puerro: '🧅', mantequilla: '🧈', tortilla: '🍳',
    almendra: '🥜', cacahuete: '🥜', nuez: '🥜', crema: '🥣', pure: '🥣'
  };

  function normalizar(texto) {
    return texto.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').trim();
  }

  function emojiPara(nombre) {
    var n = normalizar(nombre);
    if (EMOJIS[n]) return EMOJIS[n];
    var claves = Object.keys(EMOJIS);
    for (var i = 0; i < claves.length; i++) {
      if (n.indexOf(claves[i]) !== -1) return EMOJIS[claves[i]];
    }
    return '🍽️';
  }

  var REACCIONES = [
    { id: 'encanto', cara: '😍', texto: '¡Le encantó!' },
    { id: 'bien', cara: '🙂', texto: 'Le gustó' },
    { id: 'regular', cara: '😐', texto: 'Así así' },
    { id: 'mal', cara: '😖', texto: 'No le gustó' }
  ];

  function textoReaccion(id) {
    for (var i = 0; i < REACCIONES.length; i++) {
      if (REACCIONES[i].id === id) return REACCIONES[i].cara + ' ' + REACCIONES[i].texto;
    }
    return '';
  }

  /* ── Base de datos (IndexedDB) ──────────── */

  function abrirDB() {
    return new Promise(function (res, rej) {
      var pet = indexedDB.open('diario-julia', 1);
      pet.onupgradeneeded = function () {
        pet.result.createObjectStore('entradas', { keyPath: 'id' });
      };
      pet.onsuccess = function () { res(pet.result); };
      pet.onerror = function () { rej(pet.error); };
    });
  }

  function dbTodas() {
    return abrirDB().then(function (db) {
      return new Promise(function (res, rej) {
        var pet = db.transaction('entradas').objectStore('entradas').getAll();
        pet.onsuccess = function () { res(pet.result || []); };
        pet.onerror = function () { rej(pet.error); };
      });
    });
  }

  function dbGuardar(entrada) {
    return abrirDB().then(function (db) {
      return new Promise(function (res, rej) {
        var tx = db.transaction('entradas', 'readwrite');
        tx.objectStore('entradas').put(entrada);
        tx.oncomplete = function () { res(); };
        tx.onerror = function () { rej(tx.error); };
      });
    });
  }

  function dbBorrar(id) {
    return abrirDB().then(function (db) {
      return new Promise(function (res, rej) {
        var tx = db.transaction('entradas', 'readwrite');
        tx.objectStore('entradas')['delete'](id);
        tx.oncomplete = function () { res(); };
        tx.onerror = function () { rej(tx.error); };
      });
    });
  }

  /* ── Estado ─────────────────────────────── */

  var entradas = [];
  var editandoId = null;
  var formAlimentos = [];
  var formReaccion = null;
  var formFotos = [];

  var $ = function (id) { return document.getElementById(id); };

  function esc(texto) {
    return String(texto).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function hoyISO() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function fechaBonita(iso) {
    var d = new Date(iso + 'T12:00:00');
    var texto = d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
    texto = texto.charAt(0).toUpperCase() + texto.slice(1);
    if (d.getFullYear() !== new Date().getFullYear()) texto += ' de ' + d.getFullYear();
    return texto;
  }

  function fechaCorta(iso) {
    var d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
  }

  var toastTimer = null;
  function aviso(texto) {
    var t = $('toast');
    t.textContent = texto;
    t.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.classList.remove('visible'); }, 2600);
  }

  /* ── Primeras veces (para la etiqueta "¡nuevo!") ── */

  function mapaPrimerasVeces() {
    var primera = {};
    entradas.forEach(function (e) {
      (e.alimentos || []).forEach(function (a) {
        var clave = normalizar(a.n);
        if (!primera[clave] || e.fecha < primera[clave].fecha ||
            (e.fecha === primera[clave].fecha && e.creado < primera[clave].creado)) {
          primera[clave] = { fecha: e.fecha, creado: e.creado, id: e.id };
        }
      });
    });
    return primera;
  }

  /* ── Vista: Diario ──────────────────────── */

  function pintarDiario() {
    var cont = $('vista-diario');
    if (!entradas.length) {
      cont.innerHTML = '<div class="vacio"><span class="icono">🥣</span>' +
        'Todavía no hay nada apuntado.<br>Toca el botón <strong>＋</strong> para apuntar la primera comida de Júlia.</div>';
      return;
    }

    var primeras = mapaPrimerasVeces();
    var lista = entradas.slice().sort(function (a, b) {
      if (a.fecha !== b.fecha) return a.fecha < b.fecha ? 1 : -1;
      return b.creado - a.creado;
    });

    var hoy = hoyISO();
    var html = lista.map(function (e) {
      var chips = (e.alimentos || []).map(function (a) {
        var clave = normalizar(a.n);
        var esNueva = primeras[clave] && primeras[clave].id === e.id;
        return '<span class="chip' + (esNueva ? ' nuevo' : '') + '">' +
          '<span>' + esc(a.e) + '</span>' + esc(a.n) + '</span>';
      }).join('');

      var fotos = (e.fotos || []).map(function (f, i) {
        return '<img src="' + f + '" alt="Foto de la comida" data-ver="' + e.id + ':' + i + '" loading="lazy">';
      }).join('');

      return '<article class="dia">' +
        '<div class="dia-cabecera">' +
          '<div class="fecha display">' + fechaBonita(e.fecha) +
            (e.fecha === hoy ? '<span class="hoy-etiqueta">HOY</span>' : '') + '</div>' +
          '<div class="acciones">' +
            '<button class="accion-btn" data-editar="' + e.id + '" aria-label="Editar">✏️</button>' +
            '<button class="accion-btn" data-borrar="' + e.id + '" aria-label="Borrar">🗑️</button>' +
          '</div>' +
        '</div>' +
        (chips ? '<div class="chips">' + chips + '</div>' : '') +
        (e.reaccion ? '<div class="reaccion ' + e.reaccion + '">' + textoReaccion(e.reaccion) + '</div>' : '') +
        (e.nota ? '<p class="nota">' + esc(e.nota) + '</p>' : '') +
        (fotos ? '<div class="fotos">' + fotos + '</div>' : '') +
      '</article>';
    }).join('');

    cont.innerHTML = html;
  }

  /* ── Vista: Alimentos ───────────────────── */

  function pintarAlimentos() {
    var cont = $('vista-alimentos');
    var mapa = {};

    entradas.forEach(function (e) {
      (e.alimentos || []).forEach(function (a) {
        var clave = normalizar(a.n);
        if (!mapa[clave]) {
          mapa[clave] = { nombre: a.n, emoji: a.e, veces: 0, primera: e.fecha };
        }
        mapa[clave].veces++;
        if (e.fecha < mapa[clave].primera) mapa[clave].primera = e.fecha;
      });
    });

    var lista = Object.keys(mapa).map(function (k) { return mapa[k]; })
      .sort(function (a, b) { return a.primera < b.primera ? -1 : a.primera > b.primera ? 1 : 0; });

    var dias = {};
    entradas.forEach(function (e) { dias[e.fecha] = true; });

    var filas = lista.map(function (a, i) {
      return '<div class="alimento-fila">' +
        '<span class="alimento-num">' + (i + 1) + '</span>' +
        '<span class="alimento-emoji">' + esc(a.emoji) + '</span>' +
        '<span class="alimento-nombre">' + esc(a.nombre) + '</span>' +
        '<span class="alimento-meta">desde el ' + fechaCorta(a.primera) +
          '<br>' + a.veces + (a.veces === 1 ? ' vez' : ' veces') + '</span>' +
      '</div>';
    }).join('');

    cont.innerHTML =
      '<div class="stats">' +
        '<div class="stat"><div class="num display">' + lista.length + '</div><div class="desc">alimentos probados</div></div>' +
        '<div class="stat"><div class="num display">' + Object.keys(dias).length + '</div><div class="desc">días de diario</div></div>' +
      '</div>' +
      (filas
        ? '<div class="lista-alimentos">' + filas + '</div>'
        : '<div class="vacio"><span class="icono">🥕</span>Cuando apuntes comidas en el diario, aquí saldrá la lista de todo lo que Júlia ha probado, en orden.</div>') +
      htmlSync() +
      '<div class="backup">' +
        '<h2 class="display">💾 Copia de seguridad</h2>' +
        '<p>Descarga de vez en cuando una copia del diario en un archivo, por si acaso. Con «Recuperar» puedes cargarla donde quieras.</p>' +
        '<div class="backup-botones">' +
          '<button class="btn-secundario" id="btn-exportar">⬇️ Descargar copia</button>' +
          '<button class="btn-secundario" id="btn-importar">⬆️ Recuperar copia</button>' +
        '</div>' +
        '<input type="file" id="input-importar" accept=".json,application/json" hidden>' +
      '</div>';

    $('btn-exportar').addEventListener('click', exportar);
    $('btn-importar').addEventListener('click', function () { $('input-importar').click(); });
    $('input-importar').addEventListener('change', importar);
    enlazarSync();
  }

  function pintarTodo() {
    pintarDiario();
    pintarAlimentos();
  }

  /* ── Pestañas ───────────────────────────── */

  function cambiarPestana(cual) {
    var esDiario = cual === 'diario';
    $('tab-diario').setAttribute('aria-selected', esDiario);
    $('tab-alimentos').setAttribute('aria-selected', !esDiario);

  }

  $('tab-diario').addEventListener('click', function () { cambiarPestana('diario'); });
  $('tab-alimentos').addEventListener('click', function () { cambiarPestana('alimentos'); });

  /* ── Formulario ─────────────────────────── */

  function pintarReacciones() {
    $('reacciones').innerHTML = REACCIONES.map(function (r) {
      return '<button class="reaccion-opcion' + (formReaccion === r.id ? ' elegida' : '') +
        '" data-reaccion="' + r.id + '"><span class="cara">' + r.cara + '</span>' + r.texto + '</button>';
    }).join('');
  }

  function pintarChipsForm() {
    $('chips-form').innerHTML = formAlimentos.map(function (a, i) {
      return '<span class="chip-form"><span>' + esc(a.e) + '</span>' + esc(a.n) +
        '<button data-quitar="' + i + '" aria-label="Quitar ' + esc(a.n) + '">✕</button></span>';
    }).join('');

  function pintarMiniaturas() {
    $('miniaturas').innerHTML = formFotos.map(function (f, i) {
      return '<div class="miniatura"><img src="' + f + '" alt="Foto elegida">' +
        '<button data-quitar-foto="' + i + '" aria-label="Quitar foto">✕</button></div>';
    }).join('');
  }

  function abrirHoja(entrada) {
    editandoId = entrada ? entrada.id : null;
    formAlimentos = entrada ? (entrada.alimentos || []).slice() : [];
    formReaccion = entrada ? entrada.reaccion : null;
    formFotos = entrada ? (entrada.fotos || []).slice() : [];
    $('campo-fecha').value = entrada ? entrada.fecha : hoyISO();
    $('campo-nota').value = entrada ? (entrada.nota || '') : '';
    $('campo-alimento').value = '';
    $('hoja-titulo').textContent = entrada ? 'Editar entrada' : 'Apuntar una comida';
    pintarReacciones();
    pintarChipsForm();
    pintarMiniaturas();
    $('overlay').classList.add('abierta');
    $('hoja').classList.add('abierta');

  function cerrarHoja() {
    $('overlay').classList.remove('abierta');
    $('hoja').classList.remove('abierta');
  }

  $('btn-nueva').addEventListener('click', function () { abrirHoja(null); });
  $('overlay').addEventListener('click', cerrarHoja);

  function anadirAlimento() {
    var campo = $('campo-alimento');
    var nombre = campo.value.trim();
    if (!nombre) return;
    nombre = nombre.charAt(0).toUpperCase() + nombre.slice(1);
    formAlimentos.push({ n: nombre, e: emojiPara(nombre) });
    campo.value = '';
    campo.focus();
    pintarChipsForm();
  }

  $('btn-anadir-alimento').addEventListener('click', anadirAlimento);
  $('campo-alimento').addEventListener('keydown', function (ev) {
    if (ev.key === 'Enter') { ev.preventDefault(); anadirAlimento(); }
  });

  $('chips-form').addEventListener('click', function (ev) {
    var btn = ev.target.closest('[data-quitar]');
    if (!btn) return;
    formAlimentos.splice(Number(btn.dataset.quitar), 1);
    pintarChipsForm();
  });

  $('reacciones').addEventListener('click', function (ev) {
    var btn = ev.target.closest('[data-reaccion]');
    if (!btn) return;
    formReaccion = formReaccion === btn.dataset.reaccion ? null : btn.dataset.reaccion;
    pintarReacciones();
  });

  /* Fotos: comprimir antes de guardar para que ocupen poco */

  function comprimirFoto(archivo) {
    return new Promise(function (res, rej) {
      var url = URL.createObjectURL(archivo);
      var img = new Image();
      img.onload = function () {
        try {
          var MAX = 1100;
          var escala = Math.min(1, MAX / Math.max(img.width, img.height));
          var c = document.createElement('canvas');
          c.width = Math.round(img.width * escala);
          c.height = Math.round(img.height * escala);
          c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
          URL.revokeObjectURL(url);
          res(c.toDataURL('image/jpeg', 0.78));
        } catch (e) { URL.revokeObjectURL(url); rej(e); }
      };
      img.onerror = function () { URL.revokeObjectURL(url); rej(new Error('No se pudo leer la foto')); };
      img.src = url;
    });
  }

  $('btn-fotos').addEventListener('click', function () { $('input-fotos').click(); });

  $('input-fotos').addEventListener('change', function (ev) {
    var archivos = Array.prototype.slice.call(ev.target.files || []);
    ev.target.value = '';
    if (!archivos.length) return;
    $('btn-fotos').textContent = '⏳ Preparando fotos…';
    var promesas = archivos.map(function (a) {
      return comprimirFoto(a).catch(function () { return null; });
    });
    Promise.all(promesas).then(function (resultados) {
      var buenas = resultados.filter(Boolean);
      formFotos = formFotos.concat(buenas);
      if (buenas.length < archivos.length) aviso('Alguna foto no se pudo añadir');
      $('btn-fotos').textContent = '📷 Añadir fotos del momento';
      pintarMiniaturas();
    });
  });

  $('miniaturas').addEventListener('click', function (ev) {
    var btn = ev.target.closest('[data-quitar-foto]');
    if (!btn) return;
    formFotos.splice(Number(btn.dataset.quitarFoto), 1);
    pintarMiniaturas();
  });

  /* Guardar */

  $('btn-guardar').addEventListener('click', function () {
    var alimentoPendiente = $('campo-alimento').value.trim();
    if (alimentoPendiente) {
      var nombre = alimentoPendiente.charAt(0).toUpperCase() + alimentoPendiente.slice(1);
      formAlimentos.push({ n: nombre, e: emojiPara(nombre) });
    }

    var nota = $('campo-nota').value.trim();
    if (!formAlimentos.length && !nota && !formFotos.length) {
      aviso('Añade al menos un alimento, una nota o una foto');
      return;
    }

    var entrada = {
      id: editandoId || ('e' + Date.now() + Math.random().toString(36).slice(2, 7)),
      fecha: $('campo-fecha').value || hoyISO(),
      alimentos: formAlimentos,
      reaccion: formReaccion,
      nota: nota,
      fotos: formFotos,
      mod: Date.now(),
      creado: editandoId
        ? (entradas.find(function (e) { return e.id === editandoId; }) || { creado: Date.now() }).creado
        : Date.now()
    };

    var btn = $('btn-guardar');
    btn.disabled = true;
    dbGuardar(entrada).then(function () {
      var idx = entradas.findIndex(function (e) { return e.id === entrada.id; });
      if (idx >= 0) entradas[idx] = entrada; else entradas.push(entrada);
      btn.disabled = false;
      cerrarHoja();
      cambiarPestana('diario');
      pintarTodo();
      aviso(editandoId ? 'Entrada actualizada ✓' : 'Guardado en el diario ✓');
      sincronizar();
    }).catch(function () {
      btn.disabled = false;
      aviso('No se pudo guardar. Prueba con menos fotos.');
    });
  });

  /* ── Editar / borrar / ver fotos ────────── */

  var confirmandoBorrar = null;

  $('vista-diario').addEventListener('click', function (ev) {
    var editar = ev.target.closest('[data-editar]');
    if (editar) {
      var entrada = entradas.find(function (e) { return e.id === editar.dataset.editar; });
      if (entrada) abrirHoja(entrada);
      return;
    }

    var borrar = ev.target.closest('[data-borrar]');
    if (borrar) {
      var id = borrar.dataset.borrar;
      if (confirmandoBorrar === id) {
        confirmandoBorrar = null;
        dbBorrar(id).then(function () {
          entradas = entradas.filter(function (e) { return e.id !== id; });
          var t = tumbas(); t[id] = Date.now(); guardarTumbas(t);
          pintarTodo();
          aviso('Entrada borrada');
          sincronizar();
        });
      } else {
        confirmandoBorrar = id;
        borrar.classList.add('confirmar');
        borrar.textContent = '¿Borrar?';
        setTimeout(function () {
          if (confirmandoBorrar === id) {
            confirmandoBorrar = null;
            borrar.classList.remove('confirmar');
            borrar.textContent = '🗑️';
          }
        }, 3000);
      }
      return;
    }

    var foto = ev.target.closest('[data-ver]');
    if (foto) {
      $('visor-img').src = foto.src;
      $('visor').classList.add('abierto');
    }
  });

  $('visor').addEventListener('click', function () {
    $('visor').classList.remove('abierto');
    $('visor-img').src = '';
  });

  /* ── Copia de seguridad ─────────────────── */

  function exportar() {
    var datos = JSON.stringify({ app: 'diario-julia', version: 1, entradas: entradas });
    var blob = new Blob([datos], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'diario-julia-' + hoyISO() + '.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 5000);
    aviso('Copia descargada ✓');
  }

  function importar(ev) {
    var archivo = ev.target.files && ev.target.files[0];
    ev.target.value = '';
    if (!archivo) return;
    var lector = new FileReader();
    lector.onload = function () {
      try {
        var datos = JSON.parse(lector.result);
        var lista = datos.entradas || (Array.isArray(datos) ? datos : null);
        if (!Array.isArray(lista)) throw new Error('formato');
        var nuevas = 0;
        var pendientes = lista.filter(function (e) {
          return e && e.id && e.fecha && !entradas.some(function (x) { return x.id === e.id; });
        });
        Promise.all(pendientes.map(function (e) {
          if (!e.mod) e.mod = e.creado || Date.now();
          return dbGuardar(e).then(function () { entradas.push(e); nuevas++; });
        })).then(function () {
          pintarTodo();
          aviso(nuevas ? nuevas + (nuevas === 1 ? ' entrada recuperada ✓' : ' entradas recuperadas ✓') : 'Ya lo tenías todo al día ✓');
          sincronizar();
        });
      } catch (e) {
        aviso('Ese archivo no parece una copia del diario');
      }
    };
    lector.readAsText(archivo);
  }

  /* ── Sincronización con GitHub ──────────── */

  var GH = 'https://api.github.com';
  var REPO_DATOS = 'diario-julia-datos';
  var EN_CLAUDE = /claude/i.test(location.hostname);
  var estadoTexto = '';
  var sincronizando = false;
  var resincronizar = false;

  function cfg() {
    try { return JSON.parse(localStorage.getItem('dj-github') || 'null'); } catch (e) { return null; }
  }
  function guardarCfg(c) {
    if (c) localStorage.setItem('dj-github', JSON.stringify(c));
    else localStorage.removeItem('dj-github');
  }
  function shas() {
    try { return JSON.parse(localStorage.getItem('dj-shas') || '{}'); } catch (e) { return {}; }
  }
  function guardarShas(s) { localStorage.setItem('dj-shas', JSON.stringify(s)); }
  function tumbas() {
    try { return JSON.parse(localStorage.getItem('dj-borradas') || '{}'); } catch (e) { return {}; }
  }
  function guardarTumbas(t) { localStorage.setItem('dj-borradas', JSON.stringify(t)); }

  function cabeceras(token) {
    return {
      'Authorization': 'Bearer ' + token,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      'Content-Type': 'application/json'
    };
  }

  function gh(metodo, ruta, cuerpo, tipo) {
    var c = cfg();
    if (!c) return Promise.reject(new Error('sin-config'));
    var cab = cabeceras(c.token);
    if (tipo) cab.Accept = tipo;
    return fetch(GH + ruta, {
      method: metodo,
      headers: cab,
      cache: 'no-store',
      body: cuerpo ? JSON.stringify(cuerpo) : undefined
    }).then(function (r) {
      if (r.status === 404) return { noExiste: true };
      if (!r.ok) {
        var err = new Error('github-' + r.status);
        err.estado = r.status;
        throw err;
      }
      if (tipo === 'application/vnd.github.raw+json') return r.text();
      return r.status === 204 ? {} : r.json();
    });
  }

  function rutaDatos(archivo) {
    return '/repos/' + cfg().login + '/' + REPO_DATOS + '/contents/' + archivo;
  }

  function leerRaw(archivo) {
    return gh('GET', rutaDatos(archivo), null, 'application/vnd.github.raw+json');
  }

  function aB64(texto) {
    return btoa(unescape(encodeURIComponent(texto)));
  }

  function escribirArchivo(archivo, b64, mensaje) {
    var s = shas();
    var cuerpo = { message: mensaje, content: b64 };
    if (s[archivo]) cuerpo.sha = s[archivo];
    return gh('PUT', rutaDatos(archivo), cuerpo).then(function (r) {
      if (r.noExiste) { var e = new Error('repo'); e.estado = 404; throw e; }
      var s2 = shas(); s2[archivo] = r.content.sha; guardarShas(s2);
    }).catch(function (err) {
      if (err && (err.estado === 409 || err.estado === 422)) {
        return gh('GET', rutaDatos(archivo), null, 'application/vnd.github.object+json').then(function (meta) {
          var cuerpo2 = { message: mensaje, content: b64 };
          if (!meta.noExiste && meta.sha) cuerpo2.sha = meta.sha;
          return gh('PUT', rutaDatos(archivo), cuerpo2).then(function (r2) {
            var s3 = shas(); s3[archivo] = r2.content.sha; guardarShas(s3);
          });
        });
      }
      throw err;
    });
  }

  function borrarArchivo(archivo) {
    return gh('GET', rutaDatos(archivo), null, 'application/vnd.github.object+json').then(function (meta) {
      if (meta.noExiste) return;
      return gh('DELETE', rutaDatos(archivo), { message: 'Borrar entrada', sha: meta.sha });
    });
  }

  function estadoSync(texto) {
    estadoTexto = texto;
    var el = $('estado-sync');
    if (el) el.textContent = texto;
  }

  function modDe(e) { return e.mod || e.creado || 0; }

  function sincronizar() {
    if (!cfg() || EN_CLAUDE) return;
    if (sincronizando) { resincronizar = true; return; }
    sincronizando = true;
    estadoSync('⏳ Poniendo al día…');

    var indiceRemoto = { entradas: {}, borradas: {} };
    var tumbasLoc = tumbas();
    var huboCambiosLocales = false;

    leerRaw('indice.json').then(function (r) {
      if (r && r.noExiste) return;
      try {
        var j = JSON.parse(r);
        indiceRemoto.entradas = j.entradas || {};
        indiceRemoto.borradas = j.borradas || {};
      } catch (e) {}
    }).then(function () {
      var tareas = [];

      Object.keys(indiceRemoto.borradas).forEach(function (id) {
        var ts = indiceRemoto.borradas[id];
        var loc = entradas.find(function (e) { return e.id === id; });
        if (loc && ts > modDe(loc)) {
          tareas.push(dbBorrar(id).then(function () {
            entradas = entradas.filter(function (e) { return e.id !== id; });
            huboCambiosLocales = true;
          }));
        }
        if (!tumbasLoc[id] || tumbasLoc[id] < ts) tumbasLoc[id] = ts;
      });

      Object.keys(indiceRemoto.entradas).forEach(function (id) {
        var modR = indiceRemoto.entradas[id];
        if (tumbasLoc[id] && tumbasLoc[id] > modR) return;
        var loc = entradas.find(function (e) { return e.id === id; });
        if (!loc || modR > modDe(loc)) {
          tareas.push(leerRaw('e/' + id + '.json').then(function (txt) {
            if (txt && txt.noExiste) return;
            var e = JSON.parse(txt);
            return dbGuardar(e).then(function () {
              var i = entradas.findIndex(function (x) { return x.id === e.id; });
              if (i >= 0) entradas[i] = e; else entradas.push(e);
              huboCambiosLocales = true;
            });
          }));
        }
      });

      return Promise.all(tareas);
    }).then(function () {
      var subir = entradas.filter(function (e) {
        var modR = indiceRemoto.entradas[e.id];
        return !modR || modDe(e) > modR;
      });
      var borrarRemoto = Object.keys(tumbasLoc).filter(function (id) {
        return indiceRemoto.entradas[id] && tumbasLoc[id] > indiceRemoto.entradas[id];
      });

      var cadena = Promise.resolve();
      subir.forEach(function (e) {
        cadena = cadena.then(function () {
          return escribirArchivo('e/' + e.id + '.json', aB64(JSON.stringify(e)), 'Entrada del ' + e.fecha);
        });
      });
      borrarRemoto.forEach(function (id) {
        cadena = cadena.then(function () { return borrarArchivo('e/' + id + '.json'); });
      });

      return cadena.then(function () {
        var ind = { version: 1, entradas: {}, borradas: {} };
        Object.keys(indiceRemoto.borradas).forEach(function (id) { ind.borradas[id] = indiceRemoto.borradas[id]; });
        Object.keys(tumbasLoc).forEach(function (id) {
          if (!ind.borradas[id] || ind.borradas[id] < tumbasLoc[id]) ind.borradas[id] = tumbasLoc[id];
        });
        entradas.forEach(function (e) { ind.entradas[e.id] = modDe(e); });
        return escribirArchivo('indice.json', aB64(JSON.stringify(ind)), 'Actualizar índice');
      });
    }).then(function () {
      guardarTumbas(tumbasLoc);
      if (huboCambiosLocales) pintarTodo();
      var hora = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      estadoSync('✅ Todo al día en tu GitHub (' + hora + ')');
    }).catch(function (err) {
      if (err && err.message === 'sin-config') return;
      if (err && err.estado === 401) estadoSync('⚠️ La clave ya no funciona. Desconecta y vuelve a conectar con una clave nueva.');
      else if (err && err.estado === 404) estadoSync('⚠️ No encuentro tu almacén «' + REPO_DATOS + '» en GitHub.');
      else estadoSync('📴 Sin conexión — guardado en este dispositivo. Se pondrá al día solo.');
    }).then(function () {
      sincronizando = false;
      if (resincronizar) { resincronizar = false; sincronizar(); }
    });
  }

  function conectar(token) {
    var btn = $('btn-conectar');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Conectando…'; }
    var login = null;
    fetch(GH + '/user', { headers: cabeceras(token), cache: 'no-store' })
      .then(function (r) { if (!r.ok) throw new Error('clave'); return r.json(); })
      .then(function (u) {
        login = u.login;
        return fetch(GH + '/repos/' + login + '/' + REPO_DATOS, { headers: cabeceras(token), cache: 'no-store' });
      })
      .then(function (r) {
        if (r.status === 404) {
          return fetch(GH + '/user/repos', {
            method: 'POST',
            headers: cabeceras(token),
            body: JSON.stringify({ name: REPO_DATOS, private: true, auto_init: true, description: 'Datos privados del diario de alimentos de Júlia' })
          }).then(function (r2) { if (!r2.ok) throw new Error('crear'); });
        }
        if (!r.ok) throw new Error('clave');
        return r.json().then(function (repo) {
          if (repo.private === false) aviso('⚠️ Tu almacén ' + REPO_DATOS + ' es público. Hazlo privado en GitHub para proteger las fotos.');
        });
      })
      .then(function () {
        guardarCfg({ token: token, login: login });
        pintarAlimentos();
        aviso('Conectado con GitHub ✓');
        sincronizar();
      })
      .catch(function (e) {
        if (btn) { btn.disabled = false; btn.textContent = '🔗 Conectar con GitHub'; }
        if (e && e.message === 'clave') aviso('Esa clave no funciona. Revisa que la copiaste entera.');
        else if (e && e.message === 'crear') aviso('No pude crear el almacén. Crea en GitHub un repositorio privado llamado ' + REPO_DATOS + ' y vuelve a intentarlo.');
        else aviso('No pude conectar con GitHub. ¿Tienes internet?');
      });
  }

  function htmlSync() {
    var c = cfg();
    if (EN_CLAUDE) {
      return '<div class="backup"><h2 class="display">☁️ Guardar en tu GitHub</h2>' +
        '<p>Este enlace de Claude guarda el diario solo en este dispositivo. Para verlo igual en todos tus dispositivos, usa tu dirección de GitHub Pages.</p></div>';
    }
    if (!c) {
      return '<div class="backup"><h2 class="display">☁️ Guardar en tu GitHub</h2>' +
        '<p>Conecta tu cuenta y el diario entero (fotos incluidas) se guardará en un almacén privado tuyo en GitHub. Así lo verás igual en cualquier móvil u ordenador.</p>' +
        '<details class="ayuda-token"><summary>¿Cómo consigo mi clave de GitHub?</summary>' +
        '<ol>' +
        '<li>Entra en <strong>github.com</strong> con tu cuenta.</li>' +
        '<li>Ve a <strong>github.com/settings/tokens</strong>.</li>' +
        '<li>Toca <strong>Generate new token</strong> y elige <strong>(classic)</strong>.</li>' +
        '<li>En <em>Note</em> escribe «diario julia», en <em>Expiration</em> elige <strong>No expiration</strong> y marca la casilla <strong>repo</strong>.</li>' +
        '<li>Toca el botón verde <strong>Generate token</strong> y copia la clave que empieza por <code>ghp_</code>.</li>' +
        '</ol></details>' +
        '<input type="password" id="campo-token" placeholder="Pega aquí tu clave (ghp_…)" autocomplete="off">' +
        '<button class="btn-secundario btn-conectar" id="btn-conectar">🔗 Conectar con GitHub</button>' +
        '<p class="estado-sync" id="estado-sync">' + esc(estadoTexto) + '</p></div>';
    }
    return '<div class="backup"><h2 class="display">☁️ Guardado en tu GitHub</h2>' +
      '<p>Conectada como <strong>@' + esc(c.login) + '</strong>. El diario se guarda en tu almacén privado <strong>' + REPO_DATOS + '</strong> y se pone al día él solo.</p>' +
      '<div class="backup-botones">' +
        '<button class="btn-secundario" id="btn-sincronizar">🔄 Poner al día</button>' +
        '<button class="btn-secundario" id="btn-desconectar">Desconectar</button>' +
      '</div>' +
      '<button class="btn-secundario btn-magico" id="btn-enlace">🪄 Copiar mi enlace mágico</button>' +
      '<p class="estado-sync">El enlace mágico abre el diario ya conectado, sin escribir la clave: guárdalo en tus notas o pásalo solo a la familia. Quien lo tenga podrá ver y escribir en el diario.</p>' +
      '<p class="estado-sync" id="estado-sync">' + esc(estadoTexto) + '</p></div>';
  }

  function enlazarSync() {
    var b = $('btn-conectar');
    if (b) b.addEventListener('click', function () {
      var t = $('campo-token').value.trim();
      if (!t) { aviso('Pega primero tu clave de GitHub'); return; }
      conectar(t);
    });
    var s = $('btn-sincronizar');
    if (s) s.addEventListener('click', sincronizar);
    var d = $('btn-desconectar');
    if (d) d.addEventListener('click', function () {
      guardarCfg(null);
      localStorage.removeItem('dj-shas');
      estadoTexto = '';
      pintarAlimentos();
      aviso('Desconectado. El diario sigue guardado en este dispositivo.');
    });
    var m = $('btn-enlace');
    if (m) m.addEventListener('click', function () {
      var enlace = location.origin + location.pathname + '#clave=' + cfg().token;
      var listo = function () { aviso('Enlace mágico copiado ✓ Pégalo donde quieras guardarlo'); };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(enlace).then(listo, function () { copiarManual(enlace); listo(); });
      } else {
        copiarManual(enlace);
        listo();
      }
    });
  }

  function copiarManual(texto) {
    var ta = document.createElement('textarea');
    ta.value = texto;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    ta.remove();
  }

  /* ── Arranque ───────────────────────────── */

  var claveEnlace = null;
  if (!EN_CLAUDE && location.hash) {
    var trozos = location.hash.match(/clave=([A-Za-z0-9_]+)/);
    if (trozos) {
      claveEnlace = trozos[1];
    }
  }

  dbTodas().then(function (lista) {
    entradas = lista;
    pintarTodo();
    if (claveEnlace && !cfg()) {
      aviso('Enlace mágico detectado, conectando…');
      conectar(claveEnlace);
    } else {
      sincronizar();
    }
  }).catch(function () {
    pintarTodo();
    aviso('No se pudo abrir el almacén de datos de este navegador');
  });

  window.addEventListener('online', sincronizar);
})();
</script>
